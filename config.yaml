# Hugging Face Space Configuration
spaces:
  docker:
    title: "{space_name}"
    emoji: 🚀
    colorFrom: blue
    colorTo: green
    sdk: docker
    sdk_version: "3.9"
    python_version: "3.10"
    app_file: app.py
    pinned: false
    footer_text: "Deployed automatically by GrishteSync."
    dockerfile_content: |
      FROM python:3.9-slim-buster
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt
      COPY . .
      EXPOSE 7860
      CMD ["gunicorn", "--bind", "0.0.0.0:7860", "app:app"]
  
  gradio:
    title: "{space_name}"
    emoji: 🎨
    colorFrom: purple
    colorTo: pink
    sdk: gradio
    sdk_version: "5.0"
    python_version: "3.10"
    app_file: app.py
    pinned: false
    footer_text: "Gradio app built with GrishteSync."
  
  streamlit:
    title: "{space_name}"
    emoji: 📊
    colorFrom: green
    colorTo: emerald
    sdk: docker
    sdk_version: "3.9"
    python_version: "3.10"
    app_file: app.py
    pinned: false
    footer_text: "Streamlit app built with GrishteSync."
    dockerfile_content: |
      FROM python:3.9-slim-buster
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt
      COPY . .
      EXPOSE 7860
      CMD ["streamlit", "run", "app.py", "--server.port=7860", "--server.address=0.0.0.0"]

defaults:
