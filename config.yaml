spaces:
  docker:
    title: "{space_name}"
    emoji: 🚀
    colorFrom: blue
    colorTo: green
    sdk: docker
    sdk_version: "3.9"
    python_version: "3.10"
    app_file: app.py
    pinned: false
    footer_text: "Deployed automatically by GrishteSync."

  gradio:
    title: "{space_name}"
    emoji: 🎨
    colorFrom: purple
    colorTo: pink
    sdk: gradio
    sdk_version: "5.0"  # Will be overridden by dynamic fetch
    python_version: "3.10"
    app_file: app.py
    pinned: false
    footer_text: "Gradio app built with GrishteSync."

  streamlit:
    title: "{space_name}"
    emoji: 📊
    colorFrom: green
    colorTo: emerald
    sdk: docker
    sdk_version: "3.9"
    python_version: "3.10"
    app_file: app.py
    pinned: false
    footer_text: "Streamlit app built with GrishteSync."

