<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrishteSync · Prompt2Prod</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/RGmb4FKk/1781072041102.png" />
    <!-- Pyodide CDN -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* --- Same styles as before --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #070b17;
            --bg-secondary: #0f1a2b;
            --bg-card: rgba(15, 25, 45, 0.75);
            --text-primary: #e8edf5;
            --text-secondary: #b0c0d0;
            --neon-cyan: #00d4ff;
            --neon-purple: #a78bfa;
            --neon-pink: #f472b6;
            --neon-green: #34d399;
            --neon-orange: #fb923c;
            --glow-cyan: 0 0 40px rgba(0, 212, 255, 0.25);
            --border-neon: 1px solid rgba(0, 212, 255, 0.15);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.6);
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --card-bg: rgba(12, 12, 35, 0.5);
        }
        body.day-mode {
            --bg-primary: #e8f0fa;
            --bg-secondary: #d0dce8;
            --bg-card: rgba(255, 255, 255, 0.75);
            --text-primary: #1a2332;
            --text-secondary: #2d3a4c;
            --neon-cyan: #0066aa;
            --neon-purple: #6d4fc9;
            --neon-pink: #c0397a;
            --neon-green: #0d9e6c;
            --neon-orange: #c96a0a;
            --glow-cyan: 0 0 40px rgba(0, 102, 170, 0.15);
            --border-neon: 1px solid rgba(0, 102, 170, 0.2);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.08);
            --card-bg: rgba(255, 255, 255, 0.65);
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: var(--transition);
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(2px 2px at 130px 80px, #fff, transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(255, 255, 255, 0.7), transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
            transition: opacity 0.8s ease;
        }
        body.day-mode::before { opacity: 0; }
        .weather {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        body.day-mode .weather { opacity: 1; }
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            filter: blur(40px);
            animation: float-cloud 25s linear infinite;
        }
        .cloud:nth-child(1) { width: 300px; height: 100px; top: 10%; left: -10%; animation-duration: 28s; }
        .cloud:nth-child(2) { width: 400px; height: 120px; top: 30%; left: 30%; animation-duration: 32s; animation-delay: -6s; }
        .cloud:nth-child(3) { width: 250px; height: 80px; top: 60%; left: 60%; animation-duration: 24s; animation-delay: -12s; }
        @keyframes float-cloud {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(calc(100vw + 200px)); }
        }
        .sun {
            position: absolute;
            top: 5%;
            right: 8%;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffdd44, #ff8800);
            box-shadow: 0 0 80px #ffaa00, 0 0 150px #ff880066;
            animation: pulse-sun 4s ease-in-out infinite;
        }
        @keyframes pulse-sun {
            0%, 100% { transform: scale(1); box-shadow: 0 0 80px #ffaa00, 0 0 150px #ff880066; }
            50% { transform: scale(1.08); box-shadow: 0 0 100px #ffaa00, 0 0 200px #ff880088; }
        }
        .app-container {
            max-width: 1100px;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 2.5rem 2.5rem 1.5rem;
            border: var(--border-neon);
            box-shadow: var(--glow-cyan), var(--shadow-card);
            position: relative;
            z-index: 1;
            transition: var(--transition);
            overflow: hidden;
        }
        .app-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 212, 255, 0.03), transparent, rgba(167, 139, 250, 0.03), transparent);
            animation: spin 30s linear infinite;
            pointer-events: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
        }
        .logo-wrapper {
            position: relative;
            cursor: pointer;
            margin-bottom: 0.5rem;
            transition: transform 0.6s ease;
        }
        .logo-wrapper:hover { transform: scale(1.02); }
        .logo-wrapper::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink), var(--neon-cyan));
            padding: 3px;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: spin-glow 6s linear infinite;
        }
        @keyframes spin-glow { to { transform: rotate(360deg); } }
        .logo {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            border: 2px solid rgba(0, 212, 255, 0.2);
            overflow: hidden;
            transition: transform 0.6s ease, box-shadow 0.6s ease;
        }
        .logo img {
            width: 72px;
            height: 72px;
            object-fit: contain;
            border-radius: 50%;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.3));
            transition: transform 0.6s ease;
        }
        .logo-wrapper.rotated .logo {
            transform: rotate(360deg) scale(1.1);
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.4);
        }
        .brand h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
            line-height: 1.2;
            display: inline-block;
            transition: all 0.2s;
        }
        .brand h1.glitch {
            animation: glitch 0.3s ease-in-out 3;
        }
        @keyframes glitch {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-2px, 1px); text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); }
            40% { transform: translate(2px, -1px); text-shadow: -3px 0 var(--neon-cyan), 3px 0 var(--neon-pink); }
            60% { transform: translate(-1px, 2px); text-shadow: 1px 0 var(--neon-purple), -1px 0 var(--neon-orange); }
            80% { transform: translate(1px, -2px); text-shadow: -2px 0 var(--neon-orange), 2px 0 var(--neon-purple); }
            100% { transform: translate(0, 0); text-shadow: none; }
        }
        .brand .tagline {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            letter-spacing: 6px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 0.25rem;
            font-weight: 400;
        }
        .brand .tagline span { color: var(--neon-cyan); font-weight: 700; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.75rem;
            margin-bottom: 1.75rem;
            border: 1px solid rgba(0, 212, 255, 0.08);
            box-shadow: var(--shadow-card);
            transition: border-color 0.3s, box-shadow 0.3s, max-height 0.5s ease;
            position: relative;
            z-index: 2;
            overflow: hidden;
            max-height: 2000px;
        }
        .card.collapsed {
            max-height: 0 !important;
            padding: 0 1.75rem;
            margin: 0;
            border: none;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transition: max-height 0.5s ease, padding 0.3s ease, margin 0.3s ease, opacity 0.3s ease;
        }
        .card:hover {
            border-color: rgba(0, 212, 255, 0.2);
            box-shadow: var(--glow-cyan), var(--shadow-card);
        }
        body.day-mode .card {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(0, 102, 170, 0.1);
        }
        body.day-mode .card:hover { border-color: rgba(0, 102, 170, 0.25); }
        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
            cursor: pointer;
            user-select: none;
        }
        .card h2 .toggle-icon {
            transition: transform 0.3s;
            font-size: 0.8rem;
            margin-left: auto;
        }
        .card h2 .toggle-icon.collapsed { transform: rotate(-90deg); }

        .prompt-area {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .prompt-area textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.12);
            border-radius: 20px;
            padding: 1rem 1.2rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: var(--text-primary);
            min-height: 100px;
            resize: vertical;
            transition: border-color 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(4px);
            width: 100%;
            line-height: 1.6;
        }
        body.day-mode .prompt-area textarea {
            background: rgba(255, 255, 255, 0.7);
            color: #1a2332;
            border-color: rgba(0, 102, 170, 0.15);
        }
        .prompt-area textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }
        .prompt-actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .prompt-actions button {
            background: rgba(0, 212, 255, 0.06);
            border: 1px solid rgba(0, 212, 255, 0.12);
            color: var(--text-secondary);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(4px);
        }
        .prompt-actions button:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--neon-cyan);
            color: #fff;
        }
        body.day-mode .prompt-actions button {
            background: rgba(0, 102, 170, 0.05);
            color: var(--text-secondary);
        }
        body.day-mode .prompt-actions button:hover {
            background: rgba(0, 102, 170, 0.12);
            color: var(--text-primary);
        }
        .generate-btn {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(167, 139, 250, 0.2));
            border: 1px solid var(--neon-cyan);
            color: #fff;
            padding: 0.7rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.25);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(167, 139, 250, 0.3));
        }
        .generate-btn:active { transform: scale(0.96); }
        body.day-mode .generate-btn {
            background: linear-gradient(135deg, rgba(0, 102, 170, 0.15), rgba(109, 79, 201, 0.15));
            border-color: var(--neon-cyan);
            color: var(--text-primary);
        }
        body.day-mode .generate-btn:hover {
            background: linear-gradient(135deg, rgba(0, 102, 170, 0.25), rgba(109, 79, 201, 0.25));
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .suggestion-chip {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.08);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .suggestion-chip:hover {
            background: rgba(0, 212, 255, 0.12);
            border-color: var(--neon-cyan);
            color: #fff;
            transform: translateY(-1px);
        }
        body.day-mode .suggestion-chip {
            background: rgba(0, 102, 170, 0.05);
            color: var(--text-secondary);
        }
        body.day-mode .suggestion-chip:hover {
            background: rgba(0, 102, 170, 0.1);
            color: var(--text-primary);
        }
        .log {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.75rem;
        }
        .code-panel { display: none; }
        .code-panel.visible { display: block; }
        .editor-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .file-tabs {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .file-tab {
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            border: 1px solid transparent;
            color: var(--text-secondary);
            transition: all 0.2s;
            background: transparent;
            font-family: 'Inter', sans-serif;
        }
        .file-tab.active {
            background: rgba(0, 212, 255, 0.12);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }
        body.day-mode .file-tab.active {
            background: rgba(0, 102, 170, 0.1);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }
        .file-tab:hover {
            color: #fff;
            border-color: rgba(0, 212, 255, 0.2);
        }
        .editor-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.06);
        }
        .CodeMirror {
            height: auto;
            min-height: 250px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 14px;
            font-family: 'Courier New', monospace;
            padding: 0.5rem 0;
        }
        body.day-mode .CodeMirror {
            background: rgba(255, 255, 255, 0.3);
        }
        .output-panel {
            margin-top: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.06);
            padding: 1rem;
            max-height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            color: var(--text-secondary);
            display: none;
        }
        .output-panel.visible { display: block; }
        .output-panel .stdout { color: var(--neon-green); }
        .output-panel .stderr { color: #f85149; }
        .output-panel .no-output { color: var(--text-secondary); font-style: italic; }
        .output-panel .install-info { color: var(--neon-cyan); font-style: italic; }
        .output-panel .error-msg { color: #f85149; font-weight: bold; }
        .action-bar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            align-items: center;
        }
        .action-bar .note {
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.7;
            font-style: italic;
            margin-left: 0.5rem;
        }
        .btn-3d {
            position: relative;
            display: inline-block;
            padding: 0.6rem 1.6rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(145deg, #1a2a4a, #0d1a2e);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0a121f, 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.08s ease;
            transform: translateY(0);
        }
        .btn-3d:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0a121f, 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-3d.primary {
            background: linear-gradient(145deg, #0077be, #005a8c);
            box-shadow: 0 6px 0 #003d66, 0 8px 20px rgba(0, 119, 190, 0.3);
        }
        .btn-3d.primary:active {
            box-shadow: 0 2px 0 #003d66, 0 8px 20px rgba(0, 119, 190, 0.2);
        }
        .btn-3d.success {
            background: linear-gradient(145deg, #0d9e6c, #0a7a52);
            box-shadow: 0 6px 0 #065c3e, 0 8px 20px rgba(13, 158, 108, 0.3);
        }
        .btn-3d.success:active {
            box-shadow: 0 2px 0 #065c3e, 0 8px 20px rgba(13, 158, 108, 0.2);
        }
        .btn-3d.secondary {
            background: linear-gradient(145deg, #6d4fc9, #5539a3);
            box-shadow: 0 6px 0 #3f2b7a, 0 8px 20px rgba(109, 79, 201, 0.3);
        }
        .btn-3d.secondary:active {
            box-shadow: 0 2px 0 #3f2b7a, 0 8px 20px rgba(109, 79, 201, 0.2);
        }
        body.day-mode .btn-3d { color: #fff; }
        .btn-3d:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 6px 0 #0a121f, 0 8px 20px rgba(0,0,0,0.4);
        }
        .progress-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            height: 8px;
            margin-top: 1rem;
            overflow: hidden;
            display: none;
        }
        .progress-container.visible { display: block; }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 40px;
            transition: width 0.4s ease;
        }
        .progress-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
            text-align: right;
        }
        .footer {
            margin-top: 2rem;
            padding-top: 1.2rem;
            border-top: 1px solid rgba(0, 212, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            position: relative;
            z-index: 2;
        }
        .footer .heart {
            display: inline-block;
            color: var(--neon-pink);
            animation: pulse-heart 1.2s ease-in-out infinite;
        }
        @keyframes pulse-heart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }
        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }
        .footer a:hover { color: var(--neon-cyan); }
        @media (max-width: 640px) {
            .app-container { padding: 1.5rem 1.2rem; }
            .brand h1 { font-size: 1.8rem; }
            .logo { width: 72px; height: 72px; }
            .logo img { width: 54px; height: 54px; }
            .prompt-area textarea { min-height: 80px; }
            .suggestions { gap: 0.3rem; }
            .sun { width: 60px; height: 60px; right: 5%; }
        }
    </style>
</head>
<body>
    <div class="weather">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="sun"></div>
    </div>
    <div class="app-container">
        <header class="header">
            <div class="logo-wrapper" id="logoWrapper">
                <div class="logo">
                    <img src="https://i.ibb.co/RGmb4FKk/1781072041102.png" alt="GrishteSync Logo" />
                </div>
            </div>
            <div class="brand">
                <h1 id="brandTitle">GrishteSync</h1>
                <div class="tagline">Prompt <span>→</span> Prod</div>
            </div>
        </header>

        <!-- Prompt Card -->
        <div class="card" id="promptCard">
            <h2 id="promptToggle">
                ⚡ Forge Your Code
                <span class="toggle-icon" id="promptToggleIcon">▾</span>
            </h2>
            <div class="prompt-area" id="promptContent">
                <textarea id="genPrompt" placeholder="Describe what you want to build...">Create a Python script that prints a random fact about space</textarea>
                <div class="prompt-actions">
                    <button id="clearBtn" class="btn-3d" style="padding:0.3rem 1rem;font-size:0.7rem;">✕ Clear</button>
                    <button id="pasteBtn" class="btn-3d" style="padding:0.3rem 1rem;font-size:0.7rem;">📋 Paste</button>
                    <button id="genBtn" class="generate-btn" style="margin-left:auto;">🚀 Generate</button>
                </div>
                <div class="suggestions" id="suggestionChips">
                    <span class="suggestion-chip" data-prompt="Create a Flask web app with a REST API">Flask API</span>
                    <span class="suggestion-chip" data-prompt="Build a web scraper using requests and BeautifulSoup">Web Scraper</span>
                    <span class="suggestion-chip" data-prompt="Write a Python script to analyze CSV data with pandas">Data Analysis</span>
                    <span class="suggestion-chip" data-prompt="Create a Telegram bot with python-telegram-bot">Telegram Bot</span>
                    <span class="suggestion-chip" data-prompt="Build a machine learning model with scikit-learn">ML Model</span>
                    <span class="suggestion-chip" data-prompt="Create a to-do list CLI app with argparse">CLI App</span>
                </div>
                <div class="log" id="genLog">⚡ Ready to forge.</div>
            </div>
        </div>

        <!-- Code + Output Card -->
        <div class="card code-panel" id="codePanel">
            <h2 style="cursor:default;">📄 Code &amp; Output</h2>
            <div class="editor-toolbar">
                <div class="file-tabs" id="fileTabs"></div>
                <button id="runBtn" class="btn-3d success" style="padding:0.3rem 1.2rem;font-size:0.7rem;display:none;">▶ Run</button>
            </div>
            <div class="editor-wrapper">
                <textarea id="codeEditor" style="display:none;"></textarea>
            </div>
            <div class="output-panel" id="outputPanel">
                <div id="outputContent" style="white-space:pre-wrap;"></div>
            </div>
            <div class="action-bar">
                <button id="createBtn" class="btn-3d success" style="display:none;">📦 Create Project</button>
                <button id="downloadBtn" class="btn-3d primary" style="display:none;">📥 Download ZIP</button>
                <span class="note" id="noteMsg">💡 Generated project can be downloaded as a ZIP and deployed anywhere.</span>
                <span id="fileStatus" style="font-size:0.75rem;color:var(--text-secondary);margin-left:0.5rem;"></span>
            </div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-label" id="progressLabel">0%</div>
            </div>
        </div>

        <footer class="footer">
            <span>© 2025 <a href="https://github.com/suryasticsai" target="_blank">Suryasticsai</a></span>
            <span>Made with <span class="heart">🩷</span> by <a href="https://github.com/suryasticsai" target="_blank">@suryasticsai</a></span>
            <span><a href="https://github.com/suryasticsai/grishtesync-backend" target="_blank">GitHub</a></span>
        </footer>
    </div>

    <script type="module">
        import {
            generateCode,
        } from "https://cdn.jsdelivr.net/gh/suryasticsai/grishtesync-backend@main/static/grishtesync-client.js";

        // ---- DOM refs ----
        const $ = id => document.getElementById(id);
        const genBtn = $('genBtn');
        const genPrompt = $('genPrompt');
        const genLog = $('genLog');
        const clearBtn = $('clearBtn');
        const pasteBtn = $('pasteBtn');
        const suggestionChips = document.querySelectorAll('.suggestion-chip');
        const promptToggle = $('promptToggle');
        const promptToggleIcon = $('promptToggleIcon');
        const promptContent = $('promptContent');
        const codePanel = $('codePanel');
        const fileTabs = $('fileTabs');
        const createBtn = $('createBtn');
        const downloadBtn = $('downloadBtn');
        const runBtn = $('runBtn');
        const outputPanel = $('outputPanel');
        const outputContent = $('outputContent');
        const fileStatus = $('fileStatus');
        const progressContainer = $('progressContainer');
        const progressBar = $('progressBar');
        const progressLabel = $('progressLabel');
        const noteMsg = $('noteMsg');
        const logoWrapper = $('logoWrapper');
        const brandTitle = $('brandTitle');
        const body = document.body;

        let currentFiles = {};
        let currentFile = '';
        let pyodide = null;
        let isProcessing = false;
        let audioCtx = null;
        let editor = null;
        let pyodideReady = false;

        // ---- Audio click ----
        function playClick() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.08);
        }
        document.querySelectorAll('button').forEach(b => b.addEventListener('click', playClick));

        // ---- Theme toggle ----
        let isDay = false;
        logoWrapper.addEventListener('click', () => {
            logoWrapper.classList.toggle('rotated');
            isDay = !isDay;
            body.classList.toggle('day-mode', isDay);
            brandTitle.classList.remove('glitch');
            void brandTitle.offsetWidth;
            brandTitle.classList.add('glitch');
            setTimeout(() => brandTitle.classList.remove('glitch'), 1000);
            if (isDay) playChirp();
        });

        function playChirp() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.frequency.setValueAtTime(2000, now);
            osc1.frequency.exponentialRampToValueAtTime(4000, now + 0.05);
            osc1.frequency.exponentialRampToValueAtTime(3000, now + 0.1);
            gain1.gain.setValueAtTime(0, now);
            gain1.gain.linearRampToValueAtTime(0.2, now + 0.02);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc1.start(now);
            osc1.stop(now + 0.15);
            const now2 = now + 0.2;
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.setValueAtTime(2500, now2);
            osc2.frequency.exponentialRampToValueAtTime(5000, now2 + 0.04);
            osc2.frequency.exponentialRampToValueAtTime(3500, now2 + 0.08);
            gain2.gain.setValueAtTime(0, now2);
            gain2.gain.linearRampToValueAtTime(0.15, now2 + 0.02);
            gain2.gain.exponentialRampToValueAtTime(0.001, now2 + 0.12);
            osc2.start(now2);
            osc2.stop(now2 + 0.12);
        }

        // ---- Prompt collapse ----
        promptToggle.addEventListener('click', () => {
            const isCollapsed = promptContent.style.display === 'none';
            promptContent.style.display = isCollapsed ? 'flex' : 'none';
            promptToggleIcon.classList.toggle('collapsed', !isCollapsed);
            promptToggleIcon.textContent = isCollapsed ? '▾' : '▸';
        });

        // ---- Prompt actions ----
        clearBtn.addEventListener('click', () => { genPrompt.value = ''; genPrompt.focus(); });
        pasteBtn.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                genPrompt.value = text;
                genPrompt.focus();
            } catch { genPrompt.focus(); document.execCommand('paste'); }
        });
        suggestionChips.forEach(chip => {
            chip.addEventListener('click', () => {
                genPrompt.value = chip.dataset.prompt;
                genPrompt.focus();
            });
        });
        genPrompt.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); genBtn.click(); }
        });

        // ---- Generate ----
        genBtn.addEventListener('click', async () => {
            const prompt = genPrompt.value.trim();
            if (!prompt) { genLog.innerHTML = '<span style="color:#f85149;">❌ Please enter a prompt.</span>'; return; }
            genLog.innerHTML = '⏳ Forging your code...';
            codePanel.classList.remove('visible');
            runBtn.style.display = 'none';
            createBtn.style.display = 'none';
            downloadBtn.style.display = 'none';
            outputPanel.classList.remove('visible');
            progressContainer.classList.remove('visible');
            outputContent.textContent = '';

            try {
                const result = await generateCode(prompt);
                currentFiles = result.files || {};
                const count = Object.keys(currentFiles).length;
                if (count === 0) { genLog.innerHTML = '<span style="color:#f85149;">❌ No files forged.</span>'; return; }
                codePanel.classList.add('visible');
                renderFiles(currentFiles);
                genLog.innerHTML = `<span style="color:#34d399;">✅ Forged ${count} files in ${result.generate_time || '?'}s.</span>`;
                runBtn.style.display = 'inline-block';
                createBtn.style.display = 'inline-block';
                noteMsg.textContent = '💡 Generated project — you can run and test it here, then create a ZIP for deployment.';
                if (editor) {
                    editor.setValue(currentFiles[currentFile] || '');
                    editor.refresh();
                }
                outputPanel.classList.remove('visible');
            } catch (err) {
                genLog.innerHTML = `<span style="color:#f85149;">❌ ${err.message}</span>`;
            }
        });

        // ---- Render files ----
        function renderFiles(files) {
            const names = Object.keys(files);
            if (!names.length) return;
            fileTabs.innerHTML = '';
            names.forEach((name, idx) => {
                const tab = document.createElement('span');
                tab.className = 'file-tab' + (idx === 0 ? ' active' : '');
                const isPy = name.endsWith('.py');
                tab.textContent = `${name} ${isPy ? '🐍' : '📄'}`;
                tab.dataset.filename = name;
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.file-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    switchFile(name);
                });
                fileTabs.appendChild(tab);
            });
            if (!editor) {
                const textarea = document.querySelector('#codeEditor');
                editor = CodeMirror.fromTextArea(textarea, {
                    mode: 'python',
                    lineNumbers: true,
                    theme: 'default',
                    indentUnit: 4,
                    tabSize: 4,
                    lineWrapping: true,
                    extraKeys: { 'Tab': 'indentMore' }
                });
                editor.on('change', () => {
                    if (currentFile && currentFiles[currentFile] !== undefined) {
                        currentFiles[currentFile] = editor.getValue();
                    }
                });
                editor.setSize(null, 'auto');
            }
            const first = names[0];
            switchFile(first);
        }

        function switchFile(filename) {
            currentFile = filename;
            fileStatus.textContent = `Editing: ${filename}`;
            if (editor) {
                editor.setValue(currentFiles[filename] || '');
                editor.refresh();
            }
            document.querySelectorAll('.file-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filename === filename);
            });
            runBtn.style.display = filename.endsWith('.py') ? 'inline-block' : 'none';
            outputPanel.classList.remove('visible');
            outputContent.textContent = '';
        }

        // ---- Load Pyodide with status ----
        async function loadPyodideWithRetry() {
            if (pyodideReady) return true;
            try {
                outputContent.textContent = '⏳ Loading Python runtime (Pyodide)...';
                outputPanel.classList.add('visible');
                pyodide = await globalThis.loadPyodide({
                    indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.1/full/'
                });
                pyodideReady = true;
                outputContent.textContent = '✅ Python runtime loaded.';
                return true;
            } catch (e) {
                outputContent.textContent = `❌ Failed to load Pyodide: ${e.message}`;
                console.error('Pyodide load error:', e);
                return false;
            }
        }

        // ---- SMART RUN with better error handling ----
        runBtn.addEventListener('click', async () => {
            if (!currentFile || !currentFiles[currentFile]) return;
            if (!currentFile.endsWith('.py')) {
                outputContent.textContent = '⚠️ Only Python files can be executed.';
                outputPanel.classList.add('visible');
                return;
            }

            // Ensure Pyodide is loaded
            if (!pyodideReady) {
                const loaded = await loadPyodideWithRetry();
                if (!loaded) return;
            }

            // Load micropip if not already
            let micropip = null;
            try {
                micropip = pyodide.pyimport('micropip');
            } catch {
                try {
                    await pyodide.loadPackage('micropip');
                    micropip = pyodide.pyimport('micropip');
                } catch (e) {
                    outputContent.textContent = `❌ Failed to load micropip: ${e.message}`;
                    outputPanel.classList.add('visible');
                    return;
                }
            }

            const code = currentFiles[currentFile];
            outputPanel.classList.add('visible');
            outputContent.textContent = '⏳ Running ...';

            const runWithAutoInstall = async () => {
                pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
sys.stderr = StringIO()
                `);
                let missingModule = null;

                try {
                    pyodide.runPython(code);
                } catch (err) {
                    const errMsg = String(err);
                    const match = errMsg.match(/ModuleNotFoundError: No module named ['"]([^'"]+)['"]/);
                    if (match) {
                        missingModule = match[1];
                        try {
                            outputContent.textContent = `📦 Missing module "${missingModule}". Attempting to install...`;
                            await micropip.install(missingModule);
                            outputContent.textContent += `\n✅ Installed "${missingModule}". Re-running...`;
                            pyodide.runPython(`
sys.stdout = StringIO()
sys.stderr = StringIO()
                            `);
                            try {
                                pyodide.runPython(code);
                            } catch (retryErr) {
                                const stdout2 = pyodide.runPython('sys.stdout.getvalue()');
                                const stderr2 = pyodide.runPython('sys.stderr.getvalue()');
                                let out = '';
                                if (stdout2) out += stdout2;
                                if (stderr2) out += '\n' + stderr2;
                                if (!out) out = `❌ ${retryErr}`;
                                outputContent.textContent = out;
                                return;
                            }
                        } catch (installErr) {
                            outputContent.textContent = `❌ Failed to install "${missingModule}": ${installErr}`;
                            return;
                        }
                    } else {
                        throw err;
                    }
                }

                const stdout = pyodide.runPython('sys.stdout.getvalue()');
                const stderr = pyodide.runPython('sys.stderr.getvalue()');
                let out = '';
                if (stdout) out += stdout;
                if (stderr) out += '\n' + stderr;
                if (!out) out = '(No output)';
                outputContent.textContent = out;
            };

            try {
                await runWithAutoInstall();
            } catch (err) {
                const stdout = pyodide.runPython('sys.stdout.getvalue()');
                const stderr = pyodide.runPython('sys.stderr.getvalue()');
                let out = '';
                if (stdout) out += stdout;
                if (stderr) out += '\n' + stderr;
                if (!out) out = `❌ ${err}`;
                outputContent.textContent = out;
            } finally {
                pyodide.runPython(`
sys.stdout = sys.__stdout__
sys.stderr = sys.__stderr__
                `);
            }
        });

        // ---- Create Project ----
        createBtn.addEventListener('click', async () => {
            if (isProcessing) return;
            isProcessing = true;
            createBtn.disabled = true;

            promptContent.style.display = 'none';
            promptToggleIcon.classList.add('collapsed');
            promptToggleIcon.textContent = '▸';

            progressContainer.classList.add('visible');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 8 + 2;
                if (progress > 100) progress = 100;
                progressBar.style.width = progress + '%';
                progressLabel.textContent = Math.round(progress) + '%';
                if (progress >= 100) {
                    clearInterval(interval);
                    progressLabel.textContent = '✅ Ready!';
                    createBtn.style.display = 'none';
                    downloadBtn.style.display = 'inline-block';
                    noteMsg.textContent = '✅ Project packaged — download your ZIP to deploy anywhere.';
                    isProcessing = false;
                    createBtn.disabled = false;
                }
            }, 300);

            runBtn.disabled = true;
        });

        // ---- Download ZIP ----
        downloadBtn.addEventListener('click', async () => {
            if (!Object.keys(currentFiles).length) { alert('No files to download.'); return; }
            try {
                const JSZip = (await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm')).default;
                const zip = new JSZip();
                Object.entries(currentFiles).forEach(([name, content]) => zip.file(name, content));
                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'grishtesync-project.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                noteMsg.textContent = '✅ Download started!';
            } catch (e) {
                Object.entries(currentFiles).forEach(([name, content]) => {
                    const blob = new Blob([content], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
                noteMsg.textContent = '✅ Fallback download (individual files) started.';
            }
        });

        // ---- Preload Pyodide in background ----
        (async () => {
            await loadPyodideWithRetry();
        })();

        console.log('🚀 GrishteSync · Prompt2Prod ready (with auto‑install & better error handling)');
    </script>
</body>
</html>
