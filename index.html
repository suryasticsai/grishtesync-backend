<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeForge · AI Code Arena</title>
    <!-- Favicon (GrishteSync logo) -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/RGmb4FKk/1781072041102.png" />
    <!-- Pyodide CDN -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <!-- Google Font (Orbitron for gamified feel) -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        /* ================================================================
               GLOBAL RESET & BASE – Gamified Dark Neon
            ================================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0b0b1a;
            --bg-card: rgba(20, 20, 50, 0.7);
            --neon-cyan: #00f0ff;
            --neon-purple: #b44aff;
            --neon-pink: #ff3ea5;
            --neon-green: #39ff14;
            --neon-orange: #ff8c00;
            --text-main: #e0e0ff;
            --text-dim: #8888bb;
            --glow-cyan: 0 0 30px rgba(0, 240, 255, 0.3);
            --glow-purple: 0 0 30px rgba(180, 74, 255, 0.3);
            --border-neon: 1px solid rgba(0, 240, 255, 0.25);
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Orbitron', -apple-system, sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(180, 74, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 62, 165, 0.03) 0%, transparent 60%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* Animated grid overlay */
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: grid-scroll 20s linear infinite;
        }

        @keyframes grid-scroll {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 40px 40px;
            }
        }

        .app-container {
            max-width: 1100px;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 2.5rem 2.5rem 1.5rem;
            border: var(--border-neon);
            box-shadow: var(--glow-cyan), inset 0 0 80px rgba(0, 240, 255, 0.03);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.4s ease;
        }

        .app-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 240, 255, 0.03), transparent, rgba(180, 74, 255, 0.03), transparent);
            animation: spin 30s linear infinite;
            pointer-events: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ================================================================
               HEADER – Logo + Brand (Gamified)
            ================================================================ */
        .header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }

        .logo-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .logo-wrapper::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink), var(--neon-cyan));
            padding: 2px;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: spin-glow 4s linear infinite;
        }

        @keyframes spin-glow {
            to {
                transform: rotate(360deg);
            }
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(0, 240, 255, 0.2);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.08) rotate(-5deg);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
        }

        .logo img {
            width: 54px;
            height: 54px;
            object-fit: contain;
            border-radius: 50%;
            filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.4));
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.2);
            line-height: 1.2;
        }

        .brand .tagline {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 2px;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .brand .tagline span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 12px var(--neon-cyan);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.6);
            }
        }

        /* ================================================================
               CARDS – Glassmorphism with Neon borders
            ================================================================ */
        .card {
            background: rgba(12, 12, 35, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.75rem;
            margin-bottom: 1.75rem;
            border: 1px solid rgba(0, 240, 255, 0.10);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .card:hover {
            border-color: rgba(0, 240, 255, 0.25);
            box-shadow: var(--glow-cyan), 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--neon-cyan);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .card h2 .badge {
            font-size: 0.55rem;
            background: rgba(0, 240, 255, 0.12);
            padding: 0.15rem 0.7rem;
            border-radius: 40px;
            color: var(--text-dim);
            letter-spacing: 1px;
            border: 1px solid rgba(0, 240, 255, 0.15);
        }

        /* ---- Inputs & Buttons (Neon gamified) ---- */
        input,
        textarea {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 240, 255, 0.15);
            color: var(--text-main);
            padding: 0.7rem 1rem;
            border-radius: 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            width: 100%;
            transition: border-color 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(4px);
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.15);
        }

        button {
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid rgba(0, 240, 255, 0.25);
            color: var(--text-main);
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.05);
        }

        button:hover {
            background: rgba(0, 240, 255, 0.18);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.2);
            transform: translateY(-2px);
        }

        button.primary {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(180, 74, 255, 0.2));
            border-color: var(--neon-cyan);
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        button.primary:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.35), rgba(180, 74, 255, 0.35));
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.25);
        }

        button.run-btn {
            background: rgba(57, 255, 20, 0.12);
            border-color: rgba(57, 255, 20, 0.3);
            color: var(--neon-green);
            font-size: 0.7rem;
            padding: 0.2rem 1rem;
        }

        button.run-btn:hover {
            background: rgba(57, 255, 20, 0.25);
            border-color: var(--neon-green);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
        }

        button.secondary {
            background: rgba(180, 74, 255, 0.1);
            border-color: rgba(180, 74, 255, 0.25);
            color: var(--neon-purple);
        }

        button.secondary:hover {
            background: rgba(180, 74, 255, 0.2);
            border-color: var(--neon-purple);
            box-shadow: 0 0 30px rgba(180, 74, 255, 0.2);
        }

        button:disabled {
            opacity: 0.4;
            pointer-events: none;
            transform: none !important;
        }

        /* ---- File tabs (gamified pills) ---- */
        .file-tabs {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .file-tab {
            background: rgba(0, 0, 0, 0.4);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            border: 1px solid rgba(0, 240, 255, 0.08);
            color: var(--text-dim);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'Orbitron', sans-serif;
        }

        .file-tab.active {
            background: rgba(0, 240, 255, 0.12);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
        }

        .file-tab:hover {
            border-color: rgba(0, 240, 255, 0.25);
            color: #fff;
        }

        /* ---- Code output & runner ---- */
        pre {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.06);
            border-radius: 20px;
            padding: 1.2rem;
            font-size: 0.8rem;
            font-family: 'Courier New', monospace;
            color: var(--text-main);
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 0.5rem;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .output-box {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 20px;
            padding: 1rem;
            margin-top: 0.75rem;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .output-box .stdout {
            color: var(--neon-green);
        }
        .output-box .stderr {
            color: #ff4d4d;
        }

        .log {
            color: var(--text-dim);
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }
        .log .ok {
            color: var(--neon-green);
        }
        .log .err {
            color: #ff4d4d;
        }

        /* ---- Flex utilities ---- */
        .flex {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .flex>* {
            flex: 1 1 auto;
        }
        .flex .no-grow {
            flex: 0 0 auto;
        }

        /* ---- Footer ---- */
        .footer {
            margin-top: 2rem;
            padding-top: 1.2rem;
            border-top: 1px solid rgba(0, 240, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.6rem;
            letter-spacing: 1px;
            color: var(--text-dim);
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .footer .socials {
            display: flex;
            gap: 1.2rem;
        }

        .footer .socials a {
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .footer .socials a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .footer .heart {
            color: var(--neon-pink);
            animation: pulse-heart 1.2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulse-heart {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        /* ---- Responsive ---- */
        @media (max-width: 640px) {
            .app-container {
                padding: 1.5rem 1.2rem;
            }
            .brand h1 {
                font-size: 1.4rem;
            }
            .logo {
                width: 56px;
                height: 56px;
            }
            .logo img {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- ============================================================ -->
        <!-- HEADER: Logo + Brand                                          -->
        <!-- ============================================================ -->
        <header class="header">
            <div class="logo-wrapper">
                <div class="logo">
                    <img src="https://i.ibb.co/RGmb4FKk/1781072041102.png" alt="GrishteSync Logo" />
                </div>
            </div>
            <div class="brand">
                <h1>CodeForge</h1>
                <div class="tagline">
                    <span></span> AI Code Arena · Generate · Run · Dominate
                </div>
            </div>
        </header>

        <!-- ============================================================ -->
        <!-- CARD: Generate Code                                           -->
        <!-- ============================================================ -->
        <div class="card">
            <h2>⚡ Generate <span class="badge">POST /api/generate</span></h2>
            <div class="flex">
                <input id="genPrompt" type="text" value="Create a Python script that prints a random fact about space" />
                <button id="genBtn" class="primary no-grow">🚀 Forge</button>
            </div>
            <div class="log" id="genLog">⚡ No token required — describe your dream code.</div>

            <!-- Generated Files Display -->
            <div id="generatedFilesContainer" style="display:none;" class="generated-files">
                <div class="file-tabs" id="fileTabs"></div>
                <div class="file-header">
                    <span style="font-size:0.7rem;color:var(--text-dim);">📄 <span id="currentFileName">script.py</span></span>
                    <button id="runFileBtn" class="run-btn" style="display:none;">▶ Run</button>
                </div>
                <pre id="fileContent">// Select a file to view its content</pre>
                <div id="runOutput" class="output-box" style="display:none;"></div>
                <button id="downloadBtn" class="secondary" style="margin-top:0.75rem;">📦 Download ZIP</button>
            </div>
        </div>

        <!-- ============================================================ -->
        <!-- FOOTER                                                        -->
        <!-- ============================================================ -->
        <footer class="footer">
            <span>© 2025 <a href="https://github.com/suryasticsai" style="color:inherit;text-decoration:none;">Suryasticsai</a></span>
            <span>
                Built with <span class="heart">❤️</span> · Powered by Groq &amp; Pyodide
            </span>
            <div class="socials">
                <a href="https://github.com/suryasticsai/grishtesync-backend" target="_blank">GitHub</a>
                <a href="https://suryasticsai.github.io/GrishteSync" target="_blank">GrishteSync</a>
            </div>
        </footer>
    </div>

    <!-- ============================================================ -->
    <!-- SCRIPT: Import client, Pyodide, wire everything               -->
    <!-- ============================================================ -->
    <script type="module">
        // --------------------------------------------------------------
        // 1. IMPORT THE CLIENT FROM CDN
        // --------------------------------------------------------------
        import {
            generateCode,
            on,
        } from "https://cdn.jsdelivr.net/gh/suryasticsai/grishtesync-backend@main/static/grishtesync-client.js";

        // --------------------------------------------------------------
        // 2. GRAB DOM REFS
        // --------------------------------------------------------------
        const $ = (id) => document.getElementById(id);
        const genBtn = $('genBtn');
        const genPrompt = $('genPrompt');
        const genLog = $('genLog');
        const generatedFilesContainer = $('generatedFilesContainer');
        const fileTabs = $('fileTabs');
        const fileContent = $('fileContent');
        const currentFileName = $('currentFileName');
        const downloadBtn = $('downloadBtn');
        const runFileBtn = $('runFileBtn');
        const runOutput = $('runOutput');

        let currentFiles = {};
        let currentFile = '';
        let pyodide = null;

        // --------------------------------------------------------------
        // 3. LOAD PYODIDE (embedded Python runtime)
        // --------------------------------------------------------------
        async function loadPyodideRuntime() {
            if (pyodide) return pyodide;
            genLog.innerHTML = '⏳ Loading Python runtime (Pyodide) ...';
            try {
                pyodide = await globalThis.loadPyodide({
                    indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.1/full/',
                });
                genLog.innerHTML += '<br/><span class="ok">✅ Python runtime ready!</span>';
                return pyodide;
            } catch (err) {
                genLog.innerHTML += `<br/><span class="err">❌ Failed to load Pyodide: ${err.message}</span>`;
                return null;
            }
        }

        // Load Pyodide in the background
        loadPyodideRuntime();

        // --------------------------------------------------------------
        // 4. EVENT BUS — loading states
        // --------------------------------------------------------------
        function setLoading(id, isLoading) {
            const el = $(id);
            if (!el) return;
            el.disabled = isLoading;
            el.textContent = isLoading ? '⏳ Loading...' : el.dataset.original || el.textContent;
        }

        [genBtn].forEach((btn) => {
            if (btn) btn.dataset.original = btn.textContent;
        });

        on('start', (payload) => {
            const map = { '/api/generate': genBtn };
            const btn = map[payload.endpoint];
            if (btn) setLoading(btn.id, true);
        });

        on('end', (payload) => {
            const map = { '/api/generate': genBtn };
            const btn = map[payload.endpoint];
            if (btn) setLoading(btn.id, false);
        });

        on('error', (err) => {
            [genBtn].forEach((btn) => {
                if (btn) setLoading(btn.id, false);
            });
            console.error('Global error:', err);
        });

        // --------------------------------------------------------------
        // 5. GENERATE CODE
        // --------------------------------------------------------------
        genBtn.addEventListener('click', async () => {
            const prompt = genPrompt.value.trim();
            if (!prompt) {
                genLog.innerHTML = '<span class="err">❌ Please enter a prompt.</span>';
                return;
            }

            genLog.innerHTML = '⏳ Forging code...';
            generatedFilesContainer.style.display = 'none';
            runOutput.style.display = 'none';
            runFileBtn.style.display = 'none';

            try {
                const result = await generateCode(prompt);
                currentFiles = result.files || {};
                const fileCount = Object.keys(currentFiles).length;

                if (fileCount === 0) {
                    genLog.innerHTML = '<span class="err">❌ No files were forged.</span>';
                    return;
                }

                renderFiles(currentFiles);
                generatedFilesContainer.style.display = 'block';
                genLog.innerHTML = `<span class="ok">✅ Forged ${fileCount} files in ${result.generate_time || '?'}s.</span>`;
            } catch (err) {
                genLog.innerHTML = `<span class="err">❌ ${err.message}</span>`;
            }
        });

        // --------------------------------------------------------------
        // 6. RENDER FILES & RUNNER
        // --------------------------------------------------------------
        function renderFiles(files) {
            const fileNames = Object.keys(files);
            if (fileNames.length === 0) return;

            fileTabs.innerHTML = '';

            fileNames.forEach((name, index) => {
                const tab = document.createElement('span');
                tab.className = 'file-tab' + (index === 0 ? ' active' : '');
                const isPython = name.endsWith('.py');
                tab.innerHTML = `${name} ${isPython ? '🐍' : '📄'}`;
                tab.dataset.filename = name;
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.file-tab').forEach((t) => t.classList.remove('active'));
                    tab.classList.add('active');
                    showFile(name);
                });
                fileTabs.appendChild(tab);
            });

            // Show first file
            const firstFile = fileNames[0];
            showFile(firstFile);
        }

        function showFile(filename) {
            currentFile = filename;
            currentFileName.textContent = filename;
            fileContent.textContent = currentFiles[filename];
            runOutput.style.display = 'none';
            runOutput.innerHTML = '';

            // Show run button only for Python files
            if (filename.endsWith('.py')) {
                runFileBtn.style.display = 'inline-block';
            } else {
                runFileBtn.style.display = 'none';
            }
        }

        // --------------------------------------------------------------
        // 7. RUN PYTHON CODE (via Pyodide)
        // --------------------------------------------------------------
        runFileBtn.addEventListener('click', async () => {
            if (!currentFile || !currentFiles[currentFile]) return;

            const code = currentFiles[currentFile];
            runOutput.style.display = 'block';
            runOutput.innerHTML = '⏳ Running ...';

            if (!pyodide) {
                pyodide = await loadPyodideRuntime();
                if (!pyodide) {
                    runOutput.innerHTML = '<span class="stderr">❌ Failed to load Python runtime.</span>';
                    return;
                }
            }

            try {
                pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
sys.stderr = StringIO()
                `);

                try {
                    pyodide.runPython(code);
                } catch (err) {
                    // error captured in stderr
                }

                const stdout = pyodide.runPython('sys.stdout.getvalue()');
                const stderr = pyodide.runPython('sys.stderr.getvalue()');

                let outputHtml = '';
                if (stdout) outputHtml += `<div class="stdout">${escapeHtml(stdout)}</div>`;
                if (stderr) outputHtml += `<div class="stderr">${escapeHtml(stderr)}</div>`;
                if (!stdout && !stderr) outputHtml = '<span style="color:var(--text-dim);">(No output)</span>';

                runOutput.innerHTML = outputHtml;

                pyodide.runPython(`
sys.stdout = sys.__stdout__
sys.stderr = sys.__stderr__
                `);
            } catch (err) {
                runOutput.innerHTML = `<span class="stderr">❌ Error: ${escapeHtml(err.message)}</span>`;
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // --------------------------------------------------------------
        // 8. DOWNLOAD ZIP
        // --------------------------------------------------------------
        downloadBtn.addEventListener('click', async () => {
            if (Object.keys(currentFiles).length === 0) {
                alert('No files to download.');
                return;
            }

            try {
                const JSZip = (await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm')).default;
                const zip = new JSZip();

                Object.entries(currentFiles).forEach(([name, content]) => {
                    zip.file(name, content);
                });

                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'codeforge-generated.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                // Fallback: download individually
                Object.entries(currentFiles).forEach(([name, content]) => {
                    const blob = new Blob([content], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
            }
        });

        // Enter key to generate
        genPrompt.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') genBtn.click();
        });

        console.log('🚀 CodeForge · AI Code Arena ready!');
    </script>
