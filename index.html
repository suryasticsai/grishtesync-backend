<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrishteSync Lite</title>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f7e8d0;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* ----- PALE GOLDENISH FLOWING BACKGROUND ----- */
        .golden-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fdf4e3, #f8e3c4, #efd6b3, #f5e1c0, #faf0dd);
            background-size: 400% 400%;
            animation: goldenFlow 18s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes goldenFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 30%; }
            100% { background-position: 40% 100%; }
        }

        /* ----- CANVAS STARS ----- */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* ----- MAIN CARD ----- */
        .app-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 820px;
            background: rgba(255, 248, 235, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 44px 44px 44px;
            box-shadow: 0 30px 60px rgba(180, 130, 70, 0.25), inset 0 1px 0 rgba(255, 245, 215, 0.8);
            border: 1px solid rgba(255, 235, 200, 0.6);
        }

        /* ----- HEADER & LOGO ----- */
        .brand-header {
            text-align: center;
            margin-bottom: 12px;
        }

        .logo {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #8b6f4c, #5a3f26);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }
        .logo span {
            font-weight: 300;
            background: linear-gradient(145deg, #b8946a, #7a5d3e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ----- TAGLINE WITH TYPING ----- */
        .tagline-wrapper {
            text-align: center;
            min-height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        #typewriter {
            font-size: 1.3rem;
            font-weight: 400;
            color: #4f3a27;
            letter-spacing: 0.02em;
            border-right: 2.5px solid #b28b65;
            padding-right: 6px;
            white-space: nowrap;
            overflow: hidden;
            font-style: italic;
            background: linear-gradient(135deg, #6d523b, #a88664);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ----- INPUT AREA ----- */
        .input-section {
            margin-bottom: 18px;
        }

        textarea#promptInput {
            width: 100%;
            padding: 18px 22px;
            font-size: 1rem;
            font-family: inherit;
            border: 1.5px solid rgba(200, 170, 130, 0.5);
            border-radius: 20px;
            background: rgba(255, 250, 240, 0.7);
            backdrop-filter: blur(4px);
            resize: vertical;
            min-height: 80px;
            color: #3a2c1e;
            transition: all 0.25s ease;
            outline: none;
            box-shadow: inset 0 2px 8px rgba(160, 120, 70, 0.08);
        }

        textarea#promptInput:focus {
            border-color: #c7a16b;
            background: rgba(255, 252, 245, 0.9);
            box-shadow: 0 0 0 4px rgba(200, 160, 110, 0.15), inset 0 2px 8px rgba(160, 120, 70, 0.05);
        }

        /* ----- BUTTONS ----- */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 18px 0 22px 0;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            background: rgba(235, 215, 185, 0.7);
            backdrop-filter: blur(4px);
            color: #4d3824;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 2px 6px rgba(150, 110, 60, 0.08);
            border: 1px solid rgba(255, 235, 200, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.01em;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            background: rgba(220, 190, 150, 0.85);
            box-shadow: 0 8px 20px rgba(160, 120, 70, 0.2);
            border-color: #dbbc8f;
        }
        .btn:active:not(:disabled) {
            transform: translateY(1px) scale(0.98);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: #b68b5e;
            color: #fff8ed;
            border-color: #a77a4b;
            box-shadow: 0 4px 12px rgba(180, 130, 70, 0.3);
        }
        .btn-primary:hover:not(:disabled) {
            background: #c79a6a;
            border-color: #b88956;
            box-shadow: 0 8px 24px rgba(180, 130, 70, 0.4);
        }

        .btn-icon {
            font-size: 1.1rem;
            line-height: 1;
        }

        /* ----- OUTPUT ----- */
        .output-section {
            margin-top: 6px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 6px;
        }

        .output-header label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #5f4a32;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .status-badge {
            font-size: 0.75rem;
            background: rgba(160, 200, 120, 0.25);
            padding: 4px 14px;
            border-radius: 40px;
            color: #4a6a2a;
            border: 1px solid rgba(160, 200, 120, 0.3);
            transition: all 0.3s;
            min-width: 70px;
            text-align: center;
            font-weight: 500;
        }

        #codeOutput {
            width: 100%;
            padding: 22px 24px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.7;
            background: rgba(40, 33, 26, 0.85);
            backdrop-filter: blur(6px);
            color: #efe6d8;
            border: 1px solid rgba(200, 170, 130, 0.25);
            border-radius: 20px;
            min-height: 160px;
            resize: vertical;
            outline: none;
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.3);
            white-space: pre-wrap;
            word-break: break-word;
            transition: all 0.2s;
        }
        #codeOutput:focus {
            border-color: #c7a16b;
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 0 3px rgba(200, 160, 110, 0.15);
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 600px) {
            .app-container {
                padding: 24px 18px;
                border-radius: 32px;
            }
            .logo {
                font-size: 2rem;
            }
            #typewriter {
                font-size: 1rem;
                white-space: normal;
                border-right: none;
            }
            .btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="golden-bg"></div>
    <canvas id="starCanvas"></canvas>

    <div class="app-container">
        <div class="brand-header">
            <div class="logo">GrishteSync <span>Lite</span></div>
        </div>

        <div class="tagline-wrapper">
            <div id="typewriter"></div>
        </div>

        <div class="input-section">
            <textarea id="promptInput" placeholder="Loading prompts..."></textarea>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" id="generateBtn"><span class="btn-icon">✨</span> Generate</button>
            <button class="btn" id="regenerateBtn"><span class="btn-icon">🔄</span> Regenerate</button>
            <button class="btn" id="fixBtn"><span class="btn-icon">🔧</span> Fix</button>
            <button class="btn" id="appendBtn"><span class="btn-icon">➕</span> Append</button>
            <button class="btn" id="explainBtn"><span class="btn-icon">📖</span> Explain</button>
            <button class="btn" id="copyBtn"><span class="btn-icon">📋</span> Copy</button>
            <button class="btn" id="clearBtn"><span class="btn-icon">🗑️</span> Clear</button>
        </div>

        <div class="output-section">
            <div class="output-header">
                <label>⚡ Output</label>
                <span class="status-badge" id="statusBadge">Ready</span>
            </div>
            <textarea id="codeOutput" placeholder="Your code will stream here..." readonly></textarea>
        </div>
    </div>

    <script>
        // =============================================================
        // 1. GLOWING STARS (Canvas)
        // =============================================================
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', () => { resizeCanvas();
            initStars(); });

        class Star {
            constructor() { this.reset();
                this.driftX = (Math.random() - 0.5) * 0.15;
                this.driftY = (Math.random() - 0.5) * 0.15; }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 3.2 + 0.8;
                this.opacity = Math.random() * 0.6 + 0.3;
                this.twinkleSpeed = 0.008 + Math.random() * 0.025;
                this.phase = Math.random() * Math.PI * 2;
                this.hue = 30 + Math.random() * 30;
                this.saturation = 40 + Math.random() * 40;
                this.lightness = 75 + Math.random() * 20;
            }
            update() {
                this.x += this.driftX;
                this.y += this.driftY;
                if (this.x < -10) this.x = width + 10;
                if (this.x > width + 10) this.x = -10;
                if (this.y < -10) this.y = height + 10;
                if (this.y > height + 10) this.y = -10;
                this.phase += this.twinkleSpeed;
            }
            draw() {
                const alpha = this.opacity * (0.6 + 0.4 * Math.sin(this.phase));
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 2.5);
                grad.addColorStop(0, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${alpha})`);
                grad.addColorStop(0.4, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${alpha * 0.4})`);
                grad.addColorStop(1, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, 0)`);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(45, 80%, 95%, ${alpha * 0.9})`;
                ctx.fill();
            }
        }

        function initStars() {
            stars = [];
            const count = Math.min(180, Math.floor((width * height) / 5000));
            for (let i = 0; i < count; i++) stars.push(new Star());
        }

        function animateStars() {
            ctx.clearRect(0, 0, width, height);
            for (let star of stars) { star.update();
                star.draw(); }
            requestAnimationFrame(animateStars);
        }
        resizeCanvas();
        initStars();
        animateStars();

        // =============================================================
        // 2. UNIVERSAL TYPING EFFECT (Works on any element)
        // =============================================================
        function typeText(element, text, speed = 12) {
            return new Promise((resolve) => {
                // Handle textarea vs regular elements
                const isTextarea = element.tagName === 'TEXTAREA';
                if (isTextarea) {
                    element.value = '';
                } else {
                    element.textContent = '';
                }

                let i = 0;
                const interval = setInterval(() => {
                    if (i < text.length) {
                        if (isTextarea) {
                            element.value += text.charAt(i);
                            element.scrollTop = element.scrollHeight; // Auto-scroll
                        } else {
                            element.textContent += text.charAt(i);
                        }
                        i++;
                    } else {
                        clearInterval(interval);
                        resolve();
                    }
                }, speed);
            });
        }

        // =============================================================
        // 3. TAGLINE LOOP (State of the art! just prompt it!)
        // =============================================================
        const tagline = "State of the art! just prompt it!";
        const typewriterEl = document.getElementById('typewriter');
        let charIndex = 0,
            isDeleting = false;

        async function taglineLoop() {
            while (true) { // Infinite loop
                if (!isDeleting) {
                    if (charIndex < tagline.length) {
                        typewriterEl.textContent = tagline.substring(0, charIndex + 1);
                        charIndex++;
                        await sleep(55 + Math.random() * 40);
                    } else {
                        isDeleting = true;
                        await sleep(3500);
                    }
                } else {
                    if (charIndex > 0) {
                        typewriterEl.textContent = tagline.substring(0, charIndex - 1);
                        charIndex--;
                        await sleep(25 + Math.random() * 20);
                    } else {
                        isDeleting = false;
                        await sleep(600);
                    }
                }
            }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        // Start tagline loop
        taglineLoop();

        // =============================================================
        // 4. CYCLING PLACEHOLDERS (Typing effect on input)
        // =============================================================
        const promptInput = document.getElementById('promptInput');
        const placeholders = [
            "Describe your code... e.g., 'Write a React login form'",
            "Try: 'Python function to reverse a string'",
            "Or: 'Fetch data from an API in JavaScript'",
            "How about: 'CSS animation for a loading spinner'"
        ];
        let phIndex = 0;

        async function cyclePlaceholders() {
            while (true) {
                const currentText = placeholders[phIndex];
                // Type it in
                promptInput.placeholder = '';
                for (let char of currentText) {
                    promptInput.placeholder += char;
                    await sleep(30);
                }
                await sleep(3000);
                // Erase it
                for (let i = currentText.length; i >= 0; i--) {
                    promptInput.placeholder = currentText.substring(0, i);
                    await sleep(15);
                }
                await sleep(400);
                phIndex = (phIndex + 1) % placeholders.length;
            }
        }
        cyclePlaceholders();

        // =============================================================
        // 5. APP LOGIC (with Streaming Typing for Code & Badge)
        // =============================================================
        const codeOutput = document.getElementById('codeOutput');
        const statusBadge = document.getElementById('statusBadge');
        const buttons = document.querySelectorAll('.btn');

        // Mock AI Responses
        function getMockResponse(promptText, action = 'generate') {
            const lower = promptText.toLowerCase();
            let base = '// ✨ AI-generated code\n';

            if (lower.includes('react') && lower.includes('login')) {
                base = `import React, { useState } from 'react';\n\nconst LoginForm = () => {\n  const [email, setEmail] = useState('');\n  const [password, setPassword] = useState('');\n\n  const handleSubmit = (e) => {\n    e.preventDefault();\n    console.log('Logging in with', email, password);\n  };\n\n  return (\n    <form onSubmit={handleSubmit}>\n      <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email" />\n      <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Password" />\n      <button type="submit">Login</button>\n    </form>\n  );\n};\n\nexport default LoginForm;`;
            } else if (lower.includes('python') && lower.includes('reverse')) {
                base = `def reverse_string(s: str) -> str:\n    """Reverses a given string using slicing."""\n    return s[::-1]\n\n# Example usage:\n# print(reverse_string("hello"))  # Output: "olleh"`;
            } else if (lower.includes('api') || lower.includes('fetch')) {
                base = `async function fetchData(url) {\n  try {\n    const response = await fetch(url);\n    if (!response.ok) throw new Error('Network error');\n    const data = await response.json();\n    return data;\n  } catch (error) {\n    console.error('Fetch failed:', error);\n    return null;\n  }\n}`;
            } else {
                base = `// 🤖 Generating code for: "${promptText.slice(0, 40)}${promptText.length > 40 ? '...' : ''}"\n// ----------------------------------------\nfunction solution(input) {\n  // TODO: Implement your logic here\n  console.log('Processing:', input);\n  return input;\n}`;
            }

            if (action === 'fix') {
                return base + '\n\n// 🔧 FIX: Added null checks and error boundaries for safety.';
            } else if (action === 'append') {
                return base + '\n\n// ➕ APPEND: Additional helper function\nfunction helper() {\n  console.log("Appended feature ready!");\n}';
            } else if (action === 'explain') {
                return base + '\n\n/* 📖 EXPLANATION: \n   This code handles the core logic efficiently. \n   It uses modern syntax and follows best practices.\n*/';
            } else if (action === 'regenerate') {
                return base + '\n\n// 🔄 Regenerated with an alternative approach (caching added).';
            }
            return base;
        }

        async function performAction(actionType) {
            const prompt = promptInput.value.trim();
            if (!prompt && actionType !== 'clear' && actionType !== 'copy') {
                await typeText(statusBadge, '⚠️ Prompt empty!', 40);
                return;
            }

            // Disable all buttons during streaming
            buttons.forEach(btn => btn.disabled = true);

            let statusMsg = 'Generating...';
            if (actionType === 'regenerate') statusMsg = 'Regenerating...';
            else if (actionType === 'fix') statusMsg = 'Fixing...';
            else if (actionType === 'append') statusMsg = 'Appending...';
            else if (actionType === 'explain') statusMsg = 'Explaining...';

            await typeText(statusBadge, statusMsg, 50);

            // Simulate network delay
            await sleep(300 + Math.random() * 400);

            const response = getMockResponse(prompt, actionType);
            await typeText(codeOutput, response, 10); // Stream the code!

            // Update status badge to success with typing effect
            const doneMsg = actionType.charAt(0).toUpperCase() + actionType.slice(1) + ' ✅';
            await typeText(statusBadge, doneMsg, 40);

            // Re-enable buttons
            buttons.forEach(btn => btn.disabled = false);
        }

        // ---- Button Listeners ----
        document.getElementById('generateBtn').addEventListener('click', () => performAction('generate'));
        document.getElementById('regenerateBtn').addEventListener('click', () => performAction('regenerate'));
        document.getElementById('fixBtn').addEventListener('click', () => performAction('fix'));
        document.getElementById('appendBtn').addEventListener('click', () => performAction('append'));
        document.getElementById('explainBtn').addEventListener('click', () => performAction('explain'));

        document.getElementById('copyBtn').addEventListener('click', async () => {
            if (codeOutput.value) {
                navigator.clipboard.writeText(codeOutput.value).then(() => {
                    typeText(statusBadge, 'Copied! 📋', 40);
                    setTimeout(() => typeText(statusBadge, 'Ready', 30), 1500);
                }).catch(() => {
                    typeText(statusBadge, 'Copy failed', 40);
                });
            } else {
                typeText(statusBadge, 'Nothing to copy', 40);
            }
        });

        document.getElementById('clearBtn').addEventListener('click', async () => {
            codeOutput.value = '';
            await typeText(statusBadge, 'Cleared 🗑️', 40);
            setTimeout(() => typeText(statusBadge, 'Ready', 30), 800);
        });

        // Initial ready state
        typeText(statusBadge, 'Ready', 30);
    </script>
</body>
</html>
